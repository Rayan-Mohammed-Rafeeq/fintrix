spring.application.name=fintrix

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.open-in-view=false

# Database migrations
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS}

# Used to build password reset links in the forgot-password email.
# Example: https://fintrix.app
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:3000}

# Password reset OTP settings (email code)
app.auth.otp.ttl-minutes=${APP_AUTH_OTP_TTL_MINUTES:5}
app.auth.otp.max-attempts=${APP_AUTH_OTP_MAX_ATTEMPTS:5}

app.email.brand-logo-url=${APP_EMAIL_BRAND_LOGO_URL}

# Prefer Resend (HTTP) in production to avoid SMTP egress restrictions.
# Create an API key at https://resend.com, then set APP_EMAIL_RESEND_API_KEY.
app.email.resend.api-key=${APP_EMAIL_RESEND_API_KEY}

# Optional: customize sender and brand name (sender must be verified in Resend)
app.email.from=${APP_EMAIL_FROM}
app.email.brand-name=${APP_EMAIL_BRAND_NAME:Fintrix}

app.bootstrap.admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap.admin.name=${BOOTSTRAP_ADMIN_NAME:Fintrix Admin}
app.bootstrap.admin.email=${BOOTSTRAP_ADMIN_EMAIL:admin@fintrix.local}
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:ChangeMe123!}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}

# Optional SMTP configuration (for local/dev). In production prefer Resend.
